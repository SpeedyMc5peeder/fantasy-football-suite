name: JARVISbot Autopilot

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch:
    inputs:
      command:
        description: 'Bot command to execute'
        required: true
        default: '--check-transactions'
        type: choice
        options:
          - '--check-transactions'
          - '--weekly-recap'
          - '--test-webhook'

permissions:
  contents: write # Crucial: Allows the runner to push state files back to your repo

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # The local laptop bot is primary. It force-pushes a timestamp to the
      # refs/bot-heartbeat/laptop ref every few minutes (a custom ref, not a
      # branch, so Vercel never tries to build it). If the laptop checked in
      # recently it's handling things — skip this scheduled run to avoid double
      # posts. Manual (workflow_dispatch) runs always proceed, ignoring it.
      - name: Check laptop heartbeat
        id: hb
        run: |
          SKIP=false
          HB_REF=refs/bot-heartbeat/laptop
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ALIVE=$(git ls-remote origin "$HB_REF" | cut -f1)
            if [ -n "$ALIVE" ]; then
              git fetch --depth=1 origin "$HB_REF" || true
              TS=$(git show FETCH_HEAD:heartbeat.json 2>/dev/null | grep -o '"alive_at":"[^"]*"' | cut -d'"' -f4)
              if [ -n "$TS" ]; then
                AGE=$(( $(date +%s) - $(date -d "$TS" +%s) ))
                echo "Laptop last checked in ${AGE}s ago."
                if [ "$AGE" -lt 1200 ]; then
                  echo "Local bot is alive (<20 min) — skipping cloud run to avoid double posts."
                  SKIP=true
                fi
              fi
            else
              echo "No heartbeat yet — proceeding as primary."
            fi
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.hb.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            JARVIS/package-lock.json
            Image-Gen/package-lock.json

      - name: Install JARVIS dependencies
        if: steps.hb.outputs.skip != 'true'
        run: |
          cd JARVIS
          npm ci || npm install

      - name: Install Image-Gen dependencies
        if: steps.hb.outputs.skip != 'true'
        run: |
          cd Image-Gen
          npm ci || npm install

      - name: Run Bot Command
        if: steps.hb.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLEEPER_USER_TOKEN: ${{ secrets.SLEEPER_USER_TOKEN }}
          SLEEPER_LEAGUE_ID: ${{ secrets.SLEEPER_LEAGUE_ID }}
          PERSONAL_DISCORD_WEBHOOK: ${{ secrets.PERSONAL_DISCORD_WEBHOOK }}
        run: |
          cd JARVIS
          CMD="${{ inputs.command || '--check-transactions' }}"
          echo "Running command: node index.js $CMD"
          node index.js $CMD

      - name: Commit and Push State Changes
        if: steps.hb.outputs.skip != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add changes from data folder
          git add JARVIS/data/processed_transactions.json JARVIS/data/prefix_state.json JARVIS/data/processed_news.json JARVIS/data/processed_events.json JARVIS/data/news_player_log.json || true
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new transactions or prefix states to commit."
          else
            git commit -m "chore: update transaction and prefix history [skip ci]"
            git push
            echo "State files pushed successfully."
          fi
