name: JARVISbot Autopilot

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch:
    inputs:
      command:
        description: 'Bot command to execute'
        required: true
        default: '--check-transactions'
        type: choice
        options:
          - '--check-transactions'
          - '--weekly-recap'
          - '--test-webhook'

permissions:
  contents: write # Crucial: Allows the runner to push state files back to your repo

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            Dynasty-Evaluator/package-lock.json
            JARVIS/package-lock.json
            Image-Gen/package-lock.json

      - name: Install Dynasty-Evaluator dependencies
        run: |
          cd Dynasty-Evaluator
          npm ci || npm install

      - name: Install JARVIS dependencies
        run: |
          cd JARVIS
          npm ci || npm install

      - name: Install Image-Gen dependencies
        run: |
          cd Image-Gen
          npm ci || npm install

      - name: Run Bot Command
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLEEPER_USER_TOKEN: ${{ secrets.SLEEPER_USER_TOKEN }}
          SLEEPER_LEAGUE_ID: ${{ secrets.SLEEPER_LEAGUE_ID }}
          PERSONAL_DISCORD_WEBHOOK: ${{ secrets.PERSONAL_DISCORD_WEBHOOK }}
        run: |
          cd JARVIS
          CMD="${{ inputs.command || '--check-transactions' }}"
          echo "Running command: node index.js $CMD"
          node index.js $CMD

      - name: Commit and Push State Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add changes from data folder
          git add JARVIS/data/processed_transactions.json JARVIS/data/prefix_state.json || true
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new transactions or prefix states to commit."
          else
            git commit -m "chore: update transaction and prefix history [skip ci]"
            git push
            echo "State files pushed successfully."
          fi
