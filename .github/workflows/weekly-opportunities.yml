name: Weekly Trade Opportunity Finder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 13 * * 2' # Runs every Tuesday at 13:00 UTC (8:00 AM Central Time)
  workflow_dispatch: # Allows manual triggers from the GitHub Actions tab

permissions:
  contents: write

jobs:
  find-trades:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            Dynasty-Evaluator/package-lock.json
            Trade-Machine/package-lock.json
            BS-Pod/package-lock.json
            Image-Gen/package-lock.json

      - name: Install Dynasty-Evaluator dependencies
        run: |
          cd Dynasty-Evaluator
          npm ci

      - name: Install BS-Pod dependencies
        run: |
          cd BS-Pod
          npm ci

      - name: Install Image-Gen dependencies
        run: |
          cd Image-Gen
          npm ci

      - name: Install Trade-Machine dependencies
        run: |
          cd Trade-Machine
          npm ci

      - name: Start Dynasty-Evaluator API Server
        run: |
          cd Dynasty-Evaluator
          nohup npm start > server.log 2>&1 &
          echo "Waiting for server to spin up..."
          sleep 5
          curl -s http://localhost:5000/api/health || { echo "❌ Server failed to start"; cat server.log; exit 1; }

      - name: Start Image-Gen API Server
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd Image-Gen
          nohup npm start > server.log 2>&1 &
          echo "Waiting for Image-Gen to spin up..."
          sleep 5

      - name: Run Trade Opportunity Finder & Dispatcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLEEPER_USER_TOKEN: ${{ secrets.SLEEPER_USER_TOKEN }}
          PERSONAL_DISCORD_WEBHOOK: ${{ secrets.PERSONAL_DISCORD_WEBHOOK }}
        run: |
          node Trade-Machine/scripts/find_opportunities.js

      - name: Commit and Push Weekly Opportunities
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add new opportunities markdown files
          git add Trade-Machine/opportunities/*.md || true
          
          if git diff --cached --quiet; then
            echo "No new trade opportunities generated to commit."
          else
            git commit -m "chore: update weekly trade opportunities [skip ci]"
            git push
            echo "Opportunities files committed and pushed successfully."
          fi
